; ShieldH0 – Railway automation firmware for WeMos D32R1 (ESP32)
[env:wemos_d1_mini32]
platform  = espressif32
board     = wemos_d1_mini32
framework = arduino

; Serial monitor
monitor_speed    = 115200
monitor_filters  = esp32_exception_decoder, colorize

; Filesystem
board_build.filesystem = littlefs

; OTA upload (use: pio run -t upload --upload-port <hostname>.local)
upload_protocol  = espota
upload_port      = ShieldH0.local

; Build flags
build_flags =
    -Os
    -D CORE_DEBUG_LEVEL=1
    -D FASTLED_ESP32_I2S=1

lib_deps =
    knolleary/PubSubClient @ ^2.8
    pololu/VL6180X @ ^1.3.0
    bblanchon/ArduinoJson @ ^7.2.0
    fastled/FastLED @ ^3.7.0

; USB first-flash (esptool over serial)
[env:wemos_d1_mini32_usb]
extends          = env:wemos_d1_mini32
upload_protocol  = esptool
upload_port      = /dev/cu.usbserial-120
monitor_port     = /dev/cu.usbserial-120

; Optional: PCA9685 signal support
[env:wemos_d1_mini32_pca]
extends           = env:wemos_d1_mini32
build_flags       =
    ${env:wemos_d1_mini32.build_flags}
    -D USE_PCA9685
lib_deps          =
    ${env:wemos_d1_mini32.lib_deps}
    adafruit/Adafruit PWM Servo Driver Library @ ^3.0.0
    adafruit/Adafruit BusIO @ ^1.16.1
