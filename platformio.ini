; ShieldH0 – Railway automation firmware for WeMos D32R1 (ESP32)
[env:wemos_d1_mini32]
platform  = espressif32
board     = wemos_d1_mini32
framework = arduino

; Serial monitor
monitor_speed    = 115200
monitor_filters  = esp32_exception_decoder, colorize

; Filesystem
board_build.filesystem = littlefs

; OTA upload (use: pio run -t upload --upload-port <hostname>.local)
upload_protocol  = espota
upload_port      = ShieldH0.local   ; change to your board's hostname

; Build flags
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_ARDUHAL_LOG_COLORS=1
    -D FASTLED_ESP32_I2S=1          ; use I2S DMA for WS2812 – frees CPU

lib_deps =
    ; WiFi captive portal
    tzapu/WiFiManager @ ^2.0.17
    ; MQTT
    knolleary/PubSubClient @ ^2.8
    ; LittleFS – built into ESP32 Arduino core (no external lib needed)
    ; VL6180X ToF sensor
    pololu/VL6180X @ ^1.3.0
    ; JSON
    bblanchon/ArduinoJson @ ^7.2.0
    ; WS2812 / addressable LEDs
    fastled/FastLED @ ^3.7.0
    ; mDNS + OTA are part of the ESP32 Arduino core

; ── Optional: build with PCA9685 signal support ──────────────────────
; Use:  pio run -e wemos_d1_mini32_pca
[env:wemos_d1_mini32_pca]
extends           = env:wemos_d1_mini32
build_flags       =
    ${env:wemos_d1_mini32.build_flags}
    -D USE_PCA9685
lib_deps          =
    ${env:wemos_d1_mini32.lib_deps}
    adafruit/Adafruit PWM Servo Driver Library @ ^3.0.0
    adafruit/Adafruit BusIO @ ^1.16.1
