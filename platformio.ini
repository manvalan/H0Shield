; ShieldH0 – Railway automation firmware for WeMos D32R1 (ESP32)
[env:wemos_d1_mini32]
platform  = espressif32
board     = wemos_d1_mini32
framework = arduino

; Serial monitor
monitor_speed = 115200

; Filesystem upload target
board_build.filesystem = littlefs

; Extra build flags
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_ARDUHAL_LOG_COLORS=1

lib_deps =
    ; WiFi portal + captive
    tzapu/WiFiManager @ ^2.0.17
    ; MQTT
    knolleary/PubSubClient @ ^2.8
    ; Filesystem helper
    lorol/LittleFS_esp32 @ ^1.0.6
    ; VL6180X ToF distance/ambient sensor
    pololu/VL6180X @ ^1.3.0
    ; ArduinoJson for config parsing
    bblanchon/ArduinoJson @ ^7.2.0
    ; mDNS is built into ESP32 Arduino core (ESPmDNS)
